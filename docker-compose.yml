version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - DATA_DIR=/app/data
    # Serve the pro UI (fonts + animations + mobile) via the injector wrapper.
    command: ["uvicorn", "ui_patch:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    restart: unless-stopped
    mem_limit: 4g
